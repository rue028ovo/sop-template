function triggerNotionImport() {
  document.getElementById('notionImportInput').value = '';
  document.getElementById('notionImportInput').click();
}

function importNotion(input) {
  const file = input.files[0];
  if (!file) return;
  if (/\.zip$/i.test(file.name)) {
    importNotionZip(file);
  } else {
    const reader = new FileReader();
    reader.onload = e => {
      const blocks = parseMarkdown(e.target.result, {});
      if (!blocks.length) { alert('檔案中沒有可轉換的內容。'); return; }
      const docName = file.name.replace(/\.(md|markdown)$/i, '') || 'Notion 匯入';
      showImportPreview(docName, blocks, file.name);
    };
    reader.readAsText(file, 'UTF-8');
  }
}

async function importNotionZip(file) {
  if (!window.JSZip) { alert('JSZip 尚未載入，請重新整理後再試。'); return; }
  try {
    // 解外層 ZIP
    let zip = await JSZip.loadAsync(file);

    // Notion 會包雙層 ZIP (outer → inner Part-1.zip → 實際檔案)
    const innerZipEntry = Object.values(zip.files).find(f => /\.zip$/i.test(f.name) && !f.dir);
    if (innerZipEntry) {
      const innerData = await innerZipEntry.async('arraybuffer');
      zip = await JSZip.loadAsync(innerData);
    }

    // 找所有 .md 檔
    const mdEntries = Object.values(zip.files).filter(f => /\.(md|markdown)$/i.test(f.name) && !f.dir);
    if (!mdEntries.length) { alert('ZIP 中找不到 Markdown 檔案，請確認是 Notion 匯出的 ZIP。'); return; }

    // 所有圖片 → base64 data URI
    const imageMap = {};
    const imgEntries = Object.values(zip.files).filter(f => /\.(png|jpe?g|gif|webp|svg)$/i.test(f.name) && !f.dir);
    await Promise.all(imgEntries.map(async entry => {
      const b64 = await entry.async('base64');
      const ext = entry.name.split('.').pop().toLowerCase();
      const mime = ext === 'jpg' || ext === 'jpeg' ? 'image/jpeg' : `image/${ext}`;
      const dataUrl = `data:${mime};base64,${b64}`;
      imageMap[entry.name] = dataUrl;
      try { imageMap[decodeURIComponent(entry.name)] = dataUrl; } catch(e) {}
    }));

    // 如果有多個 .md，全部匯入；顯示預覽前先排隊
    const parsed = [];
    for (const mdEntry of mdEntries) {
      const text = await mdEntry.async('string');
      const blocks = parseMarkdown(text, imageMap);
      if (blocks.length) {
        const name = mdEntry.name.replace(/\.(md|markdown)$/i,'').replace(/^.*\//,'')
          .replace(/\s+[0-9a-f]{8,}$/i,'').trim() || 'Notion 匯入';
        parsed.push({ name, blocks });
      }
    }
    if (!parsed.length) { alert('沒有可匯入的內容。'); return; }

    window._pendingImportQueue = parsed;
    window._pendingImportBlocks = parsed[0].blocks;
    showImportPreview(parsed[0].name, parsed[0].blocks, file.name);

  } catch(err) {
    alert('解壓縮失敗：' + err.message);
    console.error(err);
  }
}

function showImportPreview(docName, blocks, fileName) {
  document.getElementById('importDocName').value = docName;
  document.getElementById('importFileName').textContent = fileName;
  document.getElementById('importBlockCount').textContent = blocks.length;
  document.getElementById('importModal').classList.add('show');
}

function closeImportModal() {
  document.getElementById('importModal').classList.remove('show');
  window._pendingImportBlocks = null;
}

function confirmImport() {
  const name = document.getElementById('importDocName').value.trim() || 'Notion 匯入';
  const blocks = window._pendingImportBlocks;
  if (!blocks) return;

  // 匯入第一份（已命名）
  const id = Date.now();
  docs.push({ id, name, blocks });
  activeId = id;

  // 若 ZIP 內有多份 .md，一起匯入（使用原始名稱）
  const queue = window._pendingImportQueue || [];
  queue.slice(1).forEach((item, idx) => {
    docs.push({ id: id + idx + 1, name: item.name, blocks: item.blocks });
  });
  window._pendingImportQueue = null;
  window._pendingImportBlocks = null;

  closeImportModal();
  renderTabs(); renderDoc();
  save('addDoc', name);
}

function mdInline(text) {
  let s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/_(.+?)_/g, '<em>$1</em>');
  s = s.replace(/~~(.+?)~~/g, '<s>$1</s>');
  s = s.replace(/`([^`]+)`/g, '<code style="background:var(--bg3);padding:1px 4px;border-radius:3px;font-size:.9em;font-family:monospace">$1</code>');
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;
}

function parseMarkdown(text, imageMap) {
  imageMap = imageMap || {};
  const blocks = [];
  let seed = Date.now();
  const nextId = () => seed++;
  const lines = text.split('\n');
  let i = 0;
  let lastImgBlock = null; // 用來把相鄰圖片（中間只有空行）合併成一個圖片區塊

  const resetImg = () => { lastImgBlock = null; };

  // Skip YAML frontmatter
  if (lines[0] && lines[0].trim() === '---') {
    i++;
    while (i < lines.length && lines[i].trim() !== '---') i++;
    i++;
  }

  while (i < lines.length) {
    // 去除 Notion 縮排（4 空格 or tab），保留原始結構判斷
    const raw = lines[i];
    const trimmed = raw.trim();

    // 空行：不重置圖片分組（讓相鄰圖片能合併）
    if (!trimmed) { i++; continue; }

    // ── 圖片（Notion 格式：![alt](filename.png)）──
    const imgMatch = trimmed.match(/^!\[([^\]]*)\]\(([^)]+)\)/);
    if (imgMatch) {
      let filename = imgMatch[2];
      try { filename = decodeURIComponent(filename); } catch(e) {}
      const src = imageMap[filename] || imageMap[imgMatch[2]] || null;
      if (src) {
        if (lastImgBlock) {
          // 合併到前一個圖片區塊（carousel）
          lastImgBlock.images.push({ src, cap: imgMatch[1] || '' });
        } else {
          lastImgBlock = { id: nextId(), type: 'image', images: [{ src, cap: imgMatch[1] || '' }], viewMode: 'carousel', gridCols: 2 };
          blocks.push(lastImgBlock);
        }
      }
      i++; continue;
    }

    // 非圖片、非空行 → 重置圖片分組
    resetImg();

    // ── Code block ──
    if (trimmed.startsWith('```')) {
      const codeLines = []; i++;
      while (i < lines.length && !lines[i].trim().startsWith('```')) { codeLines.push(lines[i]); i++; }
      blocks.push({ id: nextId(), type: 'code', content: codeLines.join('\n') });
      i++; continue;
    }

    // ── Headings ──
    const hm = trimmed.match(/^(#{1,4})\s+(.*)/);
    if (hm) {
      blocks.push({ id: nextId(), type: ['h1','h2','h3','h4'][hm[1].length - 1], content: mdInline(hm[2]) });
      i++; continue;
    }

    // ── Divider ──
    if (/^(-{3,}|\*{3,}|_{3,})$/.test(trimmed)) {
      blocks.push({ id: nextId(), type: 'divider' });
      i++; continue;
    }

    // ── Blockquote ──
    if (trimmed.startsWith('>')) {
      const qLines = [];
      while (i < lines.length && lines[i].trim().startsWith('>')) {
        const q = lines[i].trim().replace(/^>\s?/, '');
        if (q) qLines.push(q);
        i++;
      }
      if (qLines.length) blocks.push({ id: nextId(), type: 'quote', content: mdInline(qLines.join(' ')) });
      continue;
    }

    // ── Table → annotation ──
    if (trimmed.startsWith('|')) {
      const rows = [];
      while (i < lines.length && lines[i].trim().startsWith('|')) {
        const row = lines[i].trim();
        if (!/^\|[-| :]+\|$/.test(row))
          rows.push(row.replace(/^\||\|$/g,'').split('|').map(c=>c.trim()).join(' │ '));
        i++;
      }
      if (rows.length) blocks.push({ id: nextId(), type: 'annotation', content: rows.join('\n') });
      continue;
    }

    // ── Checklist（必須在 bullet 之前判斷）──
    if (/^[-*+]\s+\[[xX ]\]/.test(trimmed)) {
      const items = [];
      while (i < lines.length) {
        const t = lines[i].trim();
        const m = t.match(/^[-*+]\s+\[([xX ])\]\s+(.*)/);
        if (m) { items.push({ text: mdInline(m[2]), done: m[1].toLowerCase()==='x' }); i++; }
        else break;
      }
      blocks.push({ id: nextId(), type: 'checklist', items });
      continue;
    }

    // ── Bullet ──
    const bm = trimmed.match(/^[-*+]\s+(.*)/);
    if (bm) {
      blocks.push({ id: nextId(), type: 'bullet', content: mdInline(bm[1]) });
      i++; continue;
    }

    // ── Ordered list ──
    const om = trimmed.match(/^\d+[.)]\s+(.*)/);
    if (om) {
      const items = [];
      while (i < lines.length) {
        const m = lines[i].trim().match(/^\d+[.)]\s+(.*)/);
        if (m) { items.push(mdInline(m[1])); i++; }
        else break;
      }
      blocks.push({ id: nextId(), type: 'ordered', items });
      continue;
    }

    // ── 一般文字 ──
    blocks.push({ id: nextId(), type: 'text', content: mdInline(trimmed) });
    i++;
  }
  return blocks;
}

function jumpToBlock(docId, blockId) {
  closeChangelog();
  if (docId && getDoc().id !== docId) {
    const target = docs.find(d => d.id === docId);
    if (target) switchDoc(docId);
  }
  if (!blockId) return;
  setTimeout(() => {
    const el = document.getElementById('blk-' + blockId);
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.classList.add('blk-highlight');
    setTimeout(() => el.classList.remove('blk-highlight'), 1600);
  }, 150);
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function formatTime(ts) {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2,'0');
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function formatDay(ts) {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}`;
}

      window.fbDb.ref('sop_docs').once('value'),
      window.fbDb.ref('sop_changelog').once('value')
    ]).then(([docsSnap, clSnap])=>{
      const fd = docsSnap.val(); if(fd) docs = fd;
      const fc = clSnap.val();   if(fc) changelog = fc;
      renderLogin();

      // 即時監聽其他人的變更
      let skip = true;
      window.fbDb.ref('sop_docs').on('value', snap=>{
        if(skip){ skip=false; return; }
        const d = snap.val(); if(!d) return;
        docs = d;
        renderTabs(); renderDoc();
      });
      window.fbDb.ref('sop_changelog').on('value', snap=>{
        const c = snap.val(); if(c) changelog = c;
      });
    }).catch(()=>{
      try{const s=localStorage.getItem('sop_docs');if(s)docs=JSON.parse(s);}catch(e){}
      try{const c=localStorage.getItem('sop_changelog');if(c)changelog=JSON.parse(c);}catch(e){}
      renderLogin();
    });
  } else {
    try{const s=localStorage.getItem('sop_docs');if(s)docs=JSON.parse(s);}catch(e){}
    try{const c=localStorage.getItem('sop_changelog');if(c)changelog=JSON.parse(c);}catch(e){}
    renderLogin();
  }
}
init();
</script>
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">✕</span>
  <span class="lightbox-prev" id="lbPrev" onclick="event.stopPropagation();lbGo(-1)">‹</span>
  <img id="lbImg" src="" alt="">
  <span class="lightbox-next" id="lbNext" onclick="event.stopPropagation();lbGo(1)">›</span>
  <div class="lightbox-counter" id="lbCounter"></div>
</div>
</body>
</html>
